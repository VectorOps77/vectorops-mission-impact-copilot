name: CI - Quality and Security

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-and-security:
    name: Python Quality and Security Checks
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest ruff bandit pip-audit

      - name: Run Ruff lint check
        run: ruff check .

      - name: Run Bandit security scan
        run: bandit -r . -x ./venv,./.venv,./tests

      - name: Run pip-audit dependency scan
        run: pip-audit

      - name: Run unit tests
        run: pytest -q
