name: CI/CD - Quality, Security, and Azure Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  quality-and-security:
    name: Python Quality and Security Checks
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pytest ruff bandit pip-audit

      - name: Run Ruff lint check
        run: ruff check .

      - name: Run Bandit security scan
        run: bandit -r . -x ./venv,./.venv,./tests

      - name: Run pip-audit dependency scan
        run: pip-audit

      - name: Run unit tests
        run: pytest -q

  container-security:
    name: Docker Build and Trivy Scan
    runs-on: ubuntu-latest
    needs: quality-and-security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for scan
        run: |
          docker build -t ${{ vars.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.IMAGE_NAME }}:scan
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-to-azure:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: container-security
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR login server
        id: acr
        run: |
          ACR_LOGIN_SERVER=$(az acr show \
            --name ${{ vars.ACR_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query loginServer \
            --output tsv)

          echo "login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Docker login to ACR
        run: |
          az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          FULL_IMAGE="${{ steps.acr.outputs.login_server }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}"
          docker buildx build \
            --platform linux/amd64 \
            -t "$FULL_IMAGE" \
            --push .

      - name: Deploy image to Azure Container App
        run: |
          FULL_IMAGE="${{ steps.acr.outputs.login_server }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}"

          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image "$FULL_IMAGE"
